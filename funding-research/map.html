function renderMarkers() {
  markerLayer.clearLayers();
  var treatyVal = document.getElementById('treaty-filter').value;
  var riskVal = document.getElementById('risk-filter').value;
  var count = 0;
  
  orgs.forEach(function(o) {
    if (treatyVal !== 'all' && o.treaty !== treatyVal) return;
    if (riskVal === 'yes' && !o.single_funder) return;
    if (riskVal === 'no' && o.single_funder) return;
    
    var color = o.single_funder ? '#e74c3c' : '#28bcb8';
    var riskTag = o.single_funder 
      ? '<span class="tag tag-risk">Single-funder risk</span>' 
      : '<span class="tag tag-ok">Diversified</span>';
    var treatyTag = o.treaty ? '<span class="tag tag-treaty">' + o.treaty + '</span> ' : '';
    
    var marker = L.circleMarker([o.lat, o.lng], {
      radius: 5,
      fillColor: color,
      color: '#fff',
      weight: 1,
      opacity: 0.9,
      fillOpacity: 0.75
    }).bindPopup(
      '<strong>' + o.name + '</strong><br>' +
      '<span style="color:#7a8d9c;font-size:0.8rem">' + o.city + '</span><br>' +
      (o.domains ? '<span style="font-size:0.78rem">' + o.domains + '</span><br>' : '') +
      treatyTag + riskTag
    );
    markerLayer.addLayer(marker);
    count++;
  });
  
  document.getElementById('count').textContent = count;
}

document.getElementById('treaty-filter').addEventListener('change', renderMarkers);
document.getElementById('risk-filter').addEventListener('change', renderMarkers);

renderMarkers();
</script>
</body>
</html>
